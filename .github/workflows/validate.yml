name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Discover skills
        run: npx --yes skills@1.5.19 add . --list
